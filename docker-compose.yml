version: '3.8'
services:
  meeting-room-mcp:
    build: .
    ports:
      - "8080:8080"
    environment:
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://localhost:8081}
      BACKEND_REFERER: ${BACKEND_REFERER:-http://localhost:8081/com/smartofc/mtgTablet_list.do}
      TZ: ${TZ:-Asia/Seoul}
    restart: unless-stopped